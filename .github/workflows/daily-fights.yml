name: Daily Fights

# Corrective model: 3 triggers, each runs ALL remaining fights.
# If batch 1 uses everything, batches 2-3 see 0 and skip. Tolerates missed crons.
# Times in Paris (CET/CEST) converted to UTC
on:
  schedule:
    - cron: '55 18 * * *'  # 18:55 UTC = 19:55 Paris (first attempt)
    - cron: '55 20 * * *'  # 20:55 UTC = 21:55 Paris (sweep 1)
    - cron: '55 22 * * *'  # 22:55 UTC = 23:55 Paris (final sweep)
  workflow_dispatch:  # Manual trigger
    inputs:
      percent:
        description: 'Percentage of fights to use'
        required: false
        default: '100'
      dry_run:
        description: 'Dry run (check only)'
        required: false
        default: 'false'
        type: boolean

jobs:
  run-fights:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Ensure tournament registration
        env:
          LEEKWARS_USER: ${{ secrets.LEEKWARS_USER }}
          LEEKWARS_PASS: ${{ secrets.LEEKWARS_PASS }}
        run: poetry run leek tournament register leek || true

      - name: Run daily fights
        env:
          LEEKWARS_USER: ${{ secrets.LEEKWARS_USER }}
          LEEKWARS_PASS: ${{ secrets.LEEKWARS_PASS }}
        run: |
          # Corrective model: each trigger runs ALL remaining fights.
          # If 0 remaining, script exits gracefully.
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PERCENT="${{ github.event.inputs.percent || '100' }}"
            DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
            echo "Manual trigger: $PERCENT% (dry_run=$DRY_RUN)"
          else
            PERCENT=100
            DRY_RUN="false"
            echo "Scheduled sweep at UTC hour $HOUR - running all remaining fights"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            poetry run python scripts/auto_daily_fights.py --percent $PERCENT --no-buy --dry-run
          else
            poetry run python scripts/auto_daily_fights.py --percent $PERCENT --no-buy
          fi

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fight-logs
          path: logs/auto_fights.log
          retention-days: 30
